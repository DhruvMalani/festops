# Server
server.port=8080

# H2 embedded (in-memory) database
spring.datasource.url=jdbc:h2:mem:festops;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console -> http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Application
spring.application.name=FestOps

# Triage strategy: "rule" (regex) or "agentic" (Anthropic Messages API, falls back to rule-based).
# Agentic mode reads the API key from the ANTHROPIC_API_KEY environment variable.
festops.triage.mode=rule
